{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ocp-ns-dashboard.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ocp-ns-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: serviceaccount
{{- end }}
