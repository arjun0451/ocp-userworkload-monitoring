apiVersion: v1
kind: Service
metadata:
  name: {{ include "ocp-ns-dashboard.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ocp-ns-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ocp-ns-dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
