---
# =============================================================================
# Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ocp-ns-dashboard
  labels:
    app.kubernetes.io/name: ocp-ns-dashboard
    app.kubernetes.io/managed-by: platform-sre

---
# =============================================================================
# ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocp-ns-dashboard-sa
  namespace: ocp-ns-dashboard
  labels:
    app.kubernetes.io/name: ocp-ns-dashboard
    app.kubernetes.io/component: serviceaccount

---
# =============================================================================
# ClusterRole — read-only dashboard queries only
# get/list/watch on exactly the 5 resources the dashboard needs.
# No write, delete, exec, escalate, or secret access.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocp-ns-dashboard-viewer
  labels:
    app.kubernetes.io/name: ocp-ns-dashboard
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, nodes]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]

---
# =============================================================================
# ClusterRoleBinding — viewer
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ocp-ns-dashboard-viewer-binding
  labels:
    app.kubernetes.io/name: ocp-ns-dashboard
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: ocp-ns-dashboard-sa
    namespace: ocp-ns-dashboard
roleRef:
  kind: ClusterRole
  name: ocp-ns-dashboard-viewer
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# Deployment
#
# SCC: restricted-v2 (OCP default — no anyuid needed, no special grants)
#
# Why no runAsUser / fsGroup / anyuid:
#   OCP's restricted-v2 SCC automatically injects a UID from the namespace's
#   allocated range (e.g. 1000710000) at admission time. Hardcoding runAsUser
#   is what caused the previous UID range errors — the image USER directive
#   is just a hint; OCP always overrides it with the namespace UID.
#
#   The pod still runs non-root (runAsNonRoot: true enforces this).
#   The K8s API SA token, emptyDir /tmp volume, and outbound HTTPS calls
#   all work correctly under any UID — no UID-sensitive operations are used.
#
#   This manifest works identically on every OCP cluster regardless of
#   the namespace UID allocation range — zero per-cluster changes needed.
#
# Pre-requisites (all covered by this manifest):
#   1. ServiceAccount with ClusterRole viewer binding  ✓
#   2. SCC: restricted-v2 (default — nothing to grant) ✓
#   3. emptyDir /tmp for Node.js temp writes           ✓
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocp-ns-dashboard
  namespace: ocp-ns-dashboard
  labels:
    app: ocp-ns-dashboard
    app.kubernetes.io/name: ocp-ns-dashboard
    app.kubernetes.io/component: dashboard
    version: "v5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocp-ns-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ocp-ns-dashboard
        app.kubernetes.io/name: ocp-ns-dashboard
        version: "v5"
    spec:
      serviceAccountName: ocp-ns-dashboard-sa

      # ── Pod-level security ──────────────────────────────────────
      # Do NOT set runAsUser or fsGroup — restricted-v2 injects the
      # namespace UID automatically. Setting them explicitly is what
      # causes "must be in the ranges: [1000710000, 1000719999]" errors.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: ocp-ns-dashboard
          image: quay.io/arjun0451/backup/ocp-health-dashboard:v5
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"

          # ── Container-level security ────────────────────────────
          # Same rule: do NOT set runAsUser here.
          # allowPrivilegeEscalation: false and drop ALL caps are
          # compatible with restricted-v2 and are good practice.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      restartPolicy: Always

---
# =============================================================================
# Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ocp-ns-dashboard
  namespace: ocp-ns-dashboard
  labels:
    app: ocp-ns-dashboard
    app.kubernetes.io/name: ocp-ns-dashboard
spec:
  selector:
    app: ocp-ns-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
# =============================================================================
# Route — TLS edge termination, HTTP redirect
# =============================================================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ocp-ns-dashboard
  namespace: ocp-ns-dashboard
  labels:
    app: ocp-ns-dashboard
    app.kubernetes.io/name: ocp-ns-dashboard
  annotations:
    haproxy.router.openshift.io/timeout: "30s"
spec:
  to:
    kind: Service
    name: ocp-ns-dashboard
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
